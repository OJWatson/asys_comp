[build]
  command = "./scripts/build_github_pages_site.sh --skip-refresh && ./scripts/run_static_site_checks.sh"
  publish = "site"

[build.environment]
  PYTHON_VERSION = "3.10"

[[redirects]]
  from = "/index"
  to = "/index.html"
  status = 301

[[redirects]]
  from = "/projects"
  to = "/index.html#projects"
  status = 301

[[redirects]]
  from = "/projects/e5cr7"
  to = "/projects-e5cr7.html"
  status = 301

[[redirects]]
  from = "/e5cr7"
  to = "/projects/e5cr7"
  status = 301

[[redirects]]
  from = "/asreview-explainer"
  to = "/projects/e5cr7#overview"
  status = 301

[[redirects]]
  from = "/methods-results"
  to = "/projects/e5cr7#methods-results"
  status = 301

[[redirects]]
  from = "/why-more-review"
  to = "/projects/e5cr7#why-more-review"
  status = 301

[[redirects]]
  from = "/how-many-more"
  to = "/projects/e5cr7#how-many-more"
  status = 301

[[redirects]]
  from = "/lab"
  to = "/lab.html"
  status = 301

[[redirects]]
  from = "/lab/e5cr7"
  to = "/projects/e5cr7#lab-access"
  status = 301
