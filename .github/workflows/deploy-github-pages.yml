name: deploy-github-pages

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "analysis/outputs/**"
      - "config/app_refresh_config.json"
      - "integration/**"
      - "scripts/**"
      - "requirements.lock.txt"
      - ".github/workflows/deploy-github-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "github-pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock.txt

      - name: Refresh app artifacts
        run: scripts/run_data_refresh.sh

      - name: Build static GitHub Pages bundle
        run: scripts/build_github_pages_site.sh --skip-refresh

      - name: Run static site checks
        run: scripts/run_static_site_checks.sh

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
